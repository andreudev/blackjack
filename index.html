<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blackjack</title>
    <link rel="stylesheet" href="assets/css/styles.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <header class="title">Blackjack</header>

    <div class="row">
      <div class="col text-center mt-2">
        <button class="btn btn-danger" id="nuevo-juego">Nuevo juego</button>
        <button class="btn btn-primary" id="pedir-cartas">Pedir carta</button>
        <button class="btn btn-primary" id="detener">Detener</button>
      </div>
    </div>

    <div class="row container-fluid">
      <div class="col">
        <h1>Jugador 1 - <small>0</small></h1>
        <div id="jugador-cartas"></div>
      </div>
    </div>

    <div class="row container-fluid">
      <div class="col">
        <h1>Computadora - <small>0</small></h1>
        <div id="computadora-cartas"></div>
      </div>
    </div>

    <script src="assets/js/underscore.js"></script>
    <script src="assets/js/app.js"></script>
  </body>
</html>
